<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Timelapse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #photo {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
      cursor: zoom-in;
      transform-origin: center center;
    }

    #info {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      color: rgba(255, 255, 255, 0.85);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", monospace;
      font-size: 0.85rem;
      padding: 0.4rem 0.85rem;
      border-radius: 6px;
      letter-spacing: 0.04em;
      pointer-events: none;
      line-height: 1.6;
    }

    #info .label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #refresh-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      background: rgba(255,255,255,0.3);
      width: 100%;
      transform-origin: left;
    }

    #error {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(180,40,40,0.8);
      color: #fff;
      font-family: -apple-system, sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 1rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<img id="photo" src="" alt="Dernière photo timelapse">

<div id="info">
  <div class="label">Dernière photo</div>
  <div id="photo-time">chargement…</div>
</div>

<div id="refresh-bar"></div>
<div id="error">Impossible de charger l'image – nouvelle tentative en cours…</div>

<script>
  // ── À MODIFIER ──────────────────────────────────────────────────────────────
  const FILE_ID = "1MHI1eb1SNhFxZ7tE6Oqkdo3xJ1mH4V8U";
  const API_KEY = "AIzaSyBMBnMG1CLv5gdwA9YAFDOSeY76gx3E9rA";
  // ────────────────────────────────────────────────────────────────────────────

  const REFRESH_MS  = 2 * 60 * 1000;
  const ZOOM_MIN    = 1;
  const ZOOM_MAX    = 8;
  const ZOOM_CLICK  = 3;    // niveau de zoom au clic
  const ZOOM_WHEEL  = 0.15; // sensibilité molette

  const img      = document.getElementById("photo");
  const infoTime = document.getElementById("photo-time");
  const bar      = document.getElementById("refresh-bar");
  const errorBox = document.getElementById("error");

  const IMAGE_URL = `https://lh3.googleusercontent.com/d/${FILE_ID}`;
  const META_URL  = `https://www.googleapis.com/drive/v3/files/${FILE_ID}?fields=modifiedTime&key=${API_KEY}`;

  // ── État du zoom ────────────────────────────────────────────────────────────
  let scale   = 1;
  let tx = 0, ty = 0;   // translation en px écran

  function applyTransform() {
    img.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    img.style.cursor = scale > 1 ? "grab" : "zoom-in";
  }

  function resetZoom() {
    scale = 1; tx = 0; ty = 0;
    applyTransform();
  }

  function clampTranslation() {
    // Empêche de sortir de l'image
    const rect    = img.getBoundingClientRect();
    const maxX    = (rect.width  * (scale - 1)) / 2;
    const maxY    = (rect.height * (scale - 1)) / 2;
    tx = Math.max(-maxX, Math.min(maxX, tx));
    ty = Math.max(-maxY, Math.min(maxY, ty));
  }

  // ── PC : clic pour zoom/dézoom ──────────────────────────────────────────────
  let isDragging = false;

  img.addEventListener("click", e => {
    if (isDragging) return;
    if (scale === 1) {
      // Zoom centré sur le point cliqué
      const rect = img.getBoundingClientRect();
      const cx   = e.clientX - (rect.left + rect.width  / 2);
      const cy   = e.clientY - (rect.top  + rect.height / 2);
      scale = ZOOM_CLICK;
      tx    = cx * (1 - scale);
      ty    = cy * (1 - scale);
    } else {
      resetZoom();
      return;
    }
    applyTransform();
  });

  // ── PC : molette pour zoomer ────────────────────────────────────────────────
  img.addEventListener("wheel", e => {
    e.preventDefault();
    const rect    = img.getBoundingClientRect();
    const mouseX  = e.clientX - (rect.left + rect.width  / 2);
    const mouseY  = e.clientY - (rect.top  + rect.height / 2);

    const delta     = e.deltaY > 0 ? -ZOOM_WHEEL : ZOOM_WHEEL;
    const newScale  = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale * (1 + delta)));
    const scaleRatio = newScale / scale;

    // Ajuste la translation pour zoomer sous le curseur
    tx = mouseX + (tx - mouseX) * scaleRatio;
    ty = mouseY + (ty - mouseY) * scaleRatio;
    scale = newScale;

    clampTranslation();
    applyTransform();
  }, { passive: false });

  // ── PC : drag souris ────────────────────────────────────────────────────────
  let dragStartX, dragStartY, dragStartTx, dragStartTy;

  img.addEventListener("mousedown", e => {
    if (scale === 1) return;
    e.preventDefault();
    isDragging   = false;
    dragStartX   = e.clientX;
    dragStartY   = e.clientY;
    dragStartTx  = tx;
    dragStartTy  = ty;
    img.style.cursor = "grabbing";

    function onMove(e) {
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (Math.abs(dx) > 2 || Math.abs(dy) > 2) isDragging = true;
      tx = dragStartTx + dx;
      ty = dragStartTy + dy;
      clampTranslation();
      applyTransform();
    }
    function onUp() {
      img.style.cursor = scale > 1 ? "grab" : "zoom-in";
      setTimeout(() => { isDragging = false; }, 0);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup",   onUp);
    }
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup",   onUp);
  });

  // ── Mobile : pinch-to-zoom + drag 1 doigt ──────────────────────────────────
  let lastPinchDist  = null;
  let lastPinchMidX  = 0, lastPinchMidY = 0;
  let touchStartX, touchStartY, touchStartTx, touchStartTy;

  img.addEventListener("touchstart", e => {
    if (e.touches.length === 1 && scale > 1) {
      // Drag 1 doigt
      touchStartX  = e.touches[0].clientX;
      touchStartY  = e.touches[0].clientY;
      touchStartTx = tx;
      touchStartTy = ty;
    }
    if (e.touches.length === 2) {
      lastPinchDist = null; // reset pinch
    }
  }, { passive: true });

  img.addEventListener("touchmove", e => {
    e.preventDefault();

    if (e.touches.length === 1 && scale > 1) {
      // Drag 1 doigt
      tx = touchStartTx + (e.touches[0].clientX - touchStartX);
      ty = touchStartTy + (e.touches[0].clientY - touchStartY);
      clampTranslation();
      applyTransform();
    }

    if (e.touches.length === 2) {
      // Pinch
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

      if (lastPinchDist) {
        const rect      = img.getBoundingClientRect();
        const centerX   = midX - (rect.left + rect.width  / 2);
        const centerY   = midY - (rect.top  + rect.height / 2);
        const ratio     = dist / lastPinchDist;
        const newScale  = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, scale * ratio));
        const scaleRatio = newScale / scale;

        tx = centerX + (tx - centerX) * scaleRatio;
        ty = centerY + (ty - centerY) * scaleRatio;
        scale = newScale;

        clampTranslation();
        applyTransform();
      }
      lastPinchDist = dist;
      lastPinchMidX = midX;
      lastPinchMidY = midY;
    }
  }, { passive: false });

  img.addEventListener("touchend", e => {
    if (e.touches.length < 2) lastPinchDist = null;
    if (scale < 1.1) resetZoom();
  });

  // ── Échap ───────────────────────────────────────────────────────────────────
  document.addEventListener("keydown", e => { if (e.key === "Escape") resetZoom(); });

  // ── Chargement photo ────────────────────────────────────────────────────────
  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" })
      + " " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
  }

  async function loadPhoto() {
    try {
      const res  = await fetch(META_URL);
      const data = await res.json();
      infoTime.textContent = data.modifiedTime ? formatDate(data.modifiedTime) : "heure inconnue";
    } catch {
      infoTime.textContent = "heure inconnue";
    }
    const url     = `${IMAGE_URL}?t=${Date.now()}`;
    const tempImg = new Image();
    tempImg.onload  = () => { img.src = url; errorBox.style.display = "none"; };
    tempImg.onerror = () => { errorBox.style.display = "block"; setTimeout(loadPhoto, 60_000); };
    tempImg.src = url;
  }

  function startProgressBar() {
    bar.style.transition = "none";
    bar.style.transform  = "scaleX(1)";
    requestAnimationFrame(() => {
      bar.style.transition = `transform ${REFRESH_MS}ms linear`;
      bar.style.transform  = "scaleX(0)";
    });
  }

  // ── Lancement ───────────────────────────────────────────────────────────────
  loadPhoto();
  startProgressBar();
  setInterval(() => { loadPhoto(); startProgressBar(); }, REFRESH_MS);
</script>

</body>
</html>
